services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mma_fight_predictor
      POSTGRES_USER: mma
      POSTGRES_PASSWORD: mma-dev-password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mma -d mma_fight_predictor"]
      interval: 5s
      timeout: 5s
      retries: 10
  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://mma:mma-dev-password@db:5432/mma_fight_predictor
    volumes:
      - ./storage:/app/storage
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  worker:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://mma:mma-dev-password@db:5432/mma_fight_predictor
    volumes:
      - ./storage:/app/storage
      - ./app:/app/app
      - ./scripts:/app/scripts
    command: python scripts/run_import_worker.py

volumes:
  postgres-data:
