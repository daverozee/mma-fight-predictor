services:
  - type: web
    name: mma-fight-predictor
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: MMA Fight Predictor
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mma-fight-predictor-db
          property: connectionString
      - key: MODEL_PATH
        value: /app/storage/model.joblib
      - key: DATA_IMPORT_INTERVAL_SECONDS
        value: 21600
      - key: DATA_IMPORT_RUN_ON_STARTUP
        value: true
      - key: PORT
        value: 10000
    disk:
      name: app-storage
      mountPath: /app/storage
      sizeGB: 1
  - type: worker
    name: mma-fight-predictor-worker
    runtime: docker
    plan: starter
    dockerCommand: python scripts/run_import_worker.py
    envVars:
      - key: APP_NAME
        value: MMA Fight Predictor
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: mma-fight-predictor-db
          property: connectionString
      - key: MODEL_PATH
        value: /app/storage/model.joblib
      - key: DATA_IMPORT_INTERVAL_SECONDS
        value: 21600
      - key: DATA_IMPORT_RUN_ON_STARTUP
        value: true

databases:
  - name: mma-fight-predictor-db
    databaseName: mma_fight_predictor
    user: mma
