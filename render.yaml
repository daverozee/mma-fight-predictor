services:
  - type: web
    name: mma-fight-predictor
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: MMA Fight Predictor
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mma-fight-predictor-db
          property: connectionString
      - key: MODEL_PATH
        value: /app/storage/model.joblib
      - key: DATA_IMPORT_INTERVAL_SECONDS
        value: 21600
      - key: DATA_IMPORT_RUN_ON_STARTUP
        value: true
      - key: BALLDONTLIE_FIGHTS_IMPORT_ENABLED
        value: true
      - key: BALLDONTLIE_API_KEY
        sync: false
      - key: BALLDONTLIE_FIGHTERS_START_CURSOR
        sync: false
      - key: BALLDONTLIE_FIGHTS_PER_PAGE
        value: 100
      - key: BALLDONTLIE_FIGHTS_MAX_PAGES
        value: 250
      - key: BALLDONTLIE_FIGHTS_PAUSE_SECONDS
        value: 0
      - key: THE_ODDS_API_KEY
        sync: false
      - key: GOOGLE_SEARCH_API_KEY
        sync: false
      - key: GOOGLE_SEARCH_ENGINE_ID
        sync: false
      - key: HISTORICAL_FIGHT_RESULTS_URL
        sync: false
      - key: HISTORICAL_FIGHT_RESULTS_FORMAT
        value: winner-loser
      - key: HISTORICAL_FIGHT_RESULTS_EVENTS_URL
        sync: false
      - key: HISTORICAL_FIGHT_RESULTS_SOURCE
        value: configured-fight-history
      - key: PORT
        value: 10000
    disk:
      name: app-storage
      mountPath: /app/storage
      sizeGB: 1
  - type: worker
    name: mma-fight-predictor-worker
    runtime: docker
    plan: starter
    dockerCommand: python scripts/run_import_worker.py
    envVars:
      - key: APP_NAME
        value: MMA Fight Predictor
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: mma-fight-predictor-db
          property: connectionString
      - key: MODEL_PATH
        value: /app/storage/model.joblib
      - key: DATA_IMPORT_INTERVAL_SECONDS
        value: 21600
      - key: DATA_IMPORT_RUN_ON_STARTUP
        value: true
      - key: BALLDONTLIE_FIGHTS_IMPORT_ENABLED
        value: true
      - key: BALLDONTLIE_API_KEY
        sync: false
      - key: BALLDONTLIE_FIGHTERS_START_CURSOR
        sync: false
      - key: BALLDONTLIE_FIGHTS_PER_PAGE
        value: 100
      - key: BALLDONTLIE_FIGHTS_MAX_PAGES
        value: 250
      - key: BALLDONTLIE_FIGHTS_PAUSE_SECONDS
        value: 0
      - key: THE_ODDS_API_KEY
        sync: false
      - key: GOOGLE_SEARCH_API_KEY
        sync: false
      - key: GOOGLE_SEARCH_ENGINE_ID
        sync: false
      - key: HISTORICAL_FIGHT_RESULTS_URL
        sync: false
      - key: HISTORICAL_FIGHT_RESULTS_FORMAT
        value: winner-loser
      - key: HISTORICAL_FIGHT_RESULTS_EVENTS_URL
        sync: false
      - key: HISTORICAL_FIGHT_RESULTS_SOURCE
        value: configured-fight-history

databases:
  - name: mma-fight-predictor-db
    databaseName: mma_fight_predictor
    user: mma
